<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Visa Information Portal</title>
    <style>
        :root {
            --aqua: #7FFFD4;
            --black: #000000;
            --white: #ffffff;
            --glass: rgba(255, 255, 255, 0.85);
            --shadow: rgba(0, 0, 0, 0.15);
        }

        body {
            background-color: var(--white);
            background-image: 
                radial-gradient(at 0% 0%, hsla(160,100%,95%,1) 0, transparent 50%), 
                radial-gradient(at 100% 100%, hsla(160,100%,95%,1) 0, transparent 50%);
            font-family: 'Britannica Bold', 'Impact', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Side Image Provisions */
        .side-image-container {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            width: 250px;
            height: 400px;
            border: 2px solid var(--black);
            background: var(--aqua);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 10px 10px 0px var(--black);
            z-index: 5;
        }

        .left-image { left: 30px; }
        .right-image { right: 30px; }

        .side-image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .placeholder-text {
            color: var(--black);
            font-family: 'Impact';
            text-align: center;
            padding: 10px;
        }

        /* --- THE NARROW CENTERED CONTAINER --- */
        .container {
            text-align: center;
            background: var(--glass);
            padding: 40px 25px;
            border-radius: 30px;
            border: 2px solid var(--black);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            box-shadow: 0 20px 50px var(--shadow), 15px 15px 0px var(--aqua);
            max-width: 420px !important; 
            width: 90%;
            margin: 40px auto;
            position: relative;
            z-index: 10;
        }

        @keyframes shine {
            0% { transform: translateX(-200%) translateY(-200%) rotate(45deg); }
            100% { transform: translateX(200%) translateY(200%) rotate(45deg); }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.5);
            border: 2px solid var(--black);
            padding: 25px;
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
            text-align: left;
        }

        .glass-card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(120deg, transparent, rgba(255,255,255,0.6), transparent);
            animation: shine 4s infinite linear;
        }

        .bevel-box {
            background: var(--white);
            border: 1px solid var(--black);
            padding: 20px;
            margin: 15px 0;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 10px rgba(127, 255, 212, 0.2);
            text-align: left;
        }

        .bevel-box::after {
            content: "";
            position: absolute;
            top: -100%; left: -100%;
            width: 50%; height: 300%;
            background: linear-gradient(to right, transparent, rgba(127, 255, 212, 0.4), transparent);
            transform: rotate(25deg);
            animation: verticalShine 5s infinite;
        }

        @keyframes verticalShine {
            0% { left: -150%; }
            20% { left: 150%; }
            100% { left: 150%; }
        }

     h1, h2, h3, .item-title, button { font-family: 'Arial Black', 'Arial Bold', sans-serif !important; } body, p, li, label, select, .item-content, .value-text, .placeholder-text { font-family: 'Times New Roman', Times, serif !important; }

        p, li, label {
            font-size: 0.9rem;
            font-family: 'Segoe UI', sans-serif;
            font-weight: 600;
            line-height: 1.5;
            color: var(--black);
        }

        select, button {
            width: 100%;
            padding: 12px;
            font-family: 'Impact', sans-serif;
            text-transform: uppercase;
            border: 2px solid var(--black);
            margin-top: 10px;
            cursor: pointer;
            background: var(--white);
        }

        button {
            background: var(--black);
            color: var(--aqua);
            font-size: 1.1rem;
            transition: 0.3s;
            box-shadow: 5px 5px 0px var(--aqua);
            margin-bottom: 20px;
        }

        button:hover {
            box-shadow: none;
            transform: translate(2px, 2px);
        }

        .result-area {
            display: none;
            margin-top: 30px;
        }

        .item-title {
            color: var(--black);
            font-family: 'Impact';
            text-transform: uppercase;
            font-size: 1rem;
            margin-top: 10px;
            display: block;
            border-left: 5px solid var(--aqua);
            padding-left: 10px;
        }

 

        @media (max-width: 1100px) {
            .side-image-container { display: none; }
        }





.side-image-container img {
    width: 100%;
    height: 100%;
    object-fit: cover; /* This crops the image to fill the box perfectly */
    display: block;
}





.left-image { left: 100px !important; } .right-image { right: 100px !important; }
    </style>
</head>

        function generateVisaDetails() {
            const country = document.getElementById("country").value;
            const type = document.getElementById("visaType").value;
            const resultArea = document.getElementById("resultArea");
            
            const data = visaDatabase[country][type];

            if (!data) return;

            let html = `
                <div class="bevel-box shine-panel">
                    <h2>${data.name}</h2>
                </div>
                
                <div class="glass-card">
                    <span class="item-title">1. Name of Visa</span>
                    <span class="item-content">${data.name}</span>

                    <span class="item-title">2. Validity</span>
                    <span class="item-content">${data.validity}</span>

                    <span class="item-title">3. Total Cost (with bifurcation)</span>
                    <span class="item-content">${data.cost}</span>

                    <span class="item-title">4. Time Required</span>
                    <span class="item-content">${data.time}</span>

                    <span class="item-title">5. Age Limit</span>
                    <span class="item-content">${data.age}</span>

                    <span class="item-title">6. Education Required</span>
                    <span class="item-content">${data.education}</span>

                    <span class="item-title">7. Funds Required</span>
                    <span class="item-content">${data.funds}</span>

                    <span class="item-title">8. Documents Required</span>
                    <span class="item-content">${data.docs}</span>

                    <span class="item-title">9. For Whom the Visa is</span>
                    <span class="item-content">${data.whom}</span>

                    <span class="item-title">10. Rules for the Visa</span>
                    <span class="item-content">${data.rules}</span>

                    <span class="item-title">11. Pros and Cons</span>
                    <span class="item-content">${data.prosCons}</span>

                    <span class="item-title">12. Key Terminologies</span>
                    <span class="item-content">${data.terms}</span>

                    <span class="item-title">13. Legal Bodies Involved</span>
                    <span class="item-content">${data.legal}</span>

                    <span class="item-title">14. Detailed Process</span>
                    <span class="item-content">${data.process}</span>
                </div>

                <div class="summary-footer">
                    <h2>Summary Checklist</h2>
                    <div class="check-group">
                        <input type="checkbox" checked disabled>
                        <span>Verified 2026 Regulations</span>
                    </div>
                    <div class="check-group">
                        <input type="checkbox" checked disabled>
                        <span>Indian Applicant Friendly</span>
                    </div>
                </div>
            `;

            resultArea.innerHTML = html;
            resultArea.style.display = "block";
            
            // Scroll to top of results
            resultArea.scrollIntoView({ behavior: 'smooth' });
        }
    </script>
